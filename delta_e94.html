<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Delta E94 Calculator</title>
<style>
    body {
        font-family: Arial, sans-serif;
        margin: 40px;
        background: #f5f5f5;
    }
    .container {
        background: white;
        padding: 20px;
        border-radius: 8px;
        max-width: 500px;
        margin: auto;
        box-shadow: 0 0 10px rgba(0,0,0,0.1);
    }
    input {
        width: 80px;
        padding: 5px;
        margin: 5px;
    }
    button {
        padding: 10px 15px;
        margin-top: 10px;
        cursor: pointer;
    }
    .result {
        margin-top: 20px;
        font-size: 18px;
        font-weight: bold;
    }
</style>
</head>
<body>

<div class="container">
    <h2>ΔE94 Calculator</h2>

    <h4>Sample 1</h4>
    L: <input id="L1" type="number" step="any">
    a: <input id="a1" type="number" step="any">
    b: <input id="b1" type="number" step="any">

    <h4>Sample 2</h4>
    L: <input id="L2" type="number" step="any">
    a: <input id="a2" type="number" step="any">
    b: <input id="b2" type="number" step="any">

    <br>
    <button onclick="calculate()">Calculate ΔE94</button>

    <div class="result" id="output"></div>
</div>

<script>
function calculate() {
    // Get inputs
    let L1 = parseFloat(document.getElementById("L1").value);
    let a1 = parseFloat(document.getElementById("a1").value);
    let b1 = parseFloat(document.getElementById("b1").value);

    let L2 = parseFloat(document.getElementById("L2").value);
    let a2 = parseFloat(document.getElementById("a2").value);
    let b2 = parseFloat(document.getElementById("b2").value);

    // Chroma values
    let C1 = Math.sqrt(a1*a1 + b1*b1);
    let C2 = Math.sqrt(a2*a2 + b2*b2);

    // Differences
    let deltaL = L1 - L2;
    let deltaC = C1 - C2;
    let deltaA = a1 - a2;
    let deltaB = b1 - b2;

    let deltaH = Math.sqrt(Math.max(0, deltaA*deltaA + deltaB*deltaB - deltaC*deltaC));

    // Constants (Graphic Arts)
    let kL = 1;
    let kC = 1;
    let kH = 1;

    let K1 = 0.04;
    let K2 = 0.00;

    // Weighting functions
    let SL = 1;
    let SC = 1 + K1 * C1;
    let SH = 1 + K2 * C1;

    // ΔE94
    let deltaE94 = Math.sqrt(
        Math.pow(deltaL / (kL * SL), 2) +
        Math.pow(deltaC / (kC * SC), 2) +
        Math.pow(deltaH / (kH * SH), 2)
    );

    document.getElementById("output").innerHTML =
        "ΔE94 = " + deltaE94.toFixed(4);
}
</script>

</body>
</html>
``
