<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>New Industrial Delta E2000 Calculator</title>
<style>
    body {
        font-family: Arial, sans-serif;
        margin: 40px;
        background: #f5f5f5;
    }
    .container {
        background: white;
        padding: 20px;
        border-radius: 8px;
        max-width: 520px;
        margin: auto;
        box-shadow: 0 0 10px rgba(0,0,0,0.1);
    }
    input {
        width: 70px;
        padding: 5px;
        margin: 5px;
    }
    button {
        padding: 10px 15px;
        margin-top: 10px;
        cursor: pointer;
    }
    .result {
        margin-top: 20px;
        font-size: 18px;
        font-weight: bold;
    }
</style>
</head>
<body>

<div class="container">
    <h2>ΔE2000 Calculator</h2>

    <h4>Sample 1</h4>
    L: <input id="L1" type="number" step="any">
    a: <input id="a1" type="number" step="any">
    b: <input id="b1" type="number" step="any">

    <h4>Sample 2</h4>
    L: <input id="L2" type="number" step="any">
    a: <input id="a2" type="number" step="any">
    b: <input id="b2" type="number" step="any">

    <br>
    <button onclick="calculate()">Calculate ΔE2000</button>

    <div class="result" id="output"></div>
</div>

<script>
function rad2deg(r){ return r * 180 / Math.PI; }
function deg2rad(d){ return d * Math.PI / 180; }

function calculate() {
    let L1 = parseFloat(L1Elem.value);
    let a1 = parseFloat(a1Elem.value);
    let b1 = parseFloat(b1Elem.value);

    let L2 = parseFloat(L2Elem.value);
    let a2 = parseFloat(a2Elem.value);
    let b2 = parseFloat(b2Elem.value);

    // Step 1: Compute C
    let C1 = Math.sqrt(a1*a1 + b1*b1);
    let C2 = Math.sqrt(a2*a2 + b2*b2);
    let Cbar = (C1 + C2) / 2;

    // Step 2: Compute G
    let G = 0.5 * (1 - Math.sqrt(Math.pow(Cbar,7) / (Math.pow(Cbar,7) + Math.pow(25,7))));

    // Step 3: Adjusted a
    let a1p = (1 + G) * a1;
    let a2p = (1 + G) * a2;

    let C1p = Math.sqrt(a1p*a1p + b1*b1);
    let C2p = Math.sqrt(a2p*a2p + b2*b2);

    // Step 4: Compute hues
    let h1p = Math.atan2(b1, a1p);
    let h2p = Math.atan2(b2, a2p);

    h1p = h1p >= 0 ? rad2deg(h1p) : rad2deg(h1p) + 360;
    h2p = h2p >= 0 ? rad2deg(h2p) : rad2deg(h2p) + 360;

    // Step 5: Differences
    let dLp = L2 - L1;
    let dCp = C2p - C1p;

    let dhp;
    if (C1p * C2p === 0) dhp = 0;
    else if (Math.abs(h2p - h1p) <= 180) dhp = h2p - h1p;
    else if (h2p <= h1p) dhp = h2p - h1p + 360;
    else dhp = h2p - h1p - 360;

    let dHp = 2 * Math.sqrt(C1p * C2p) * Math.sin(deg2rad(dhp / 2));

    // Step 6: Averages
    let Lbar = (L1 + L2) / 2;
    let Cbarp = (C1p + C2p) / 2;

    let hbarp;
    if (C1p * C2p === 0) hbarp = h1p + h2p;
    else if (Math.abs(h1p - h2p) <= 180) hbarp = (h1p + h2p) / 2;
    else if (Math.abs(h1p - h2p) > 180 && (h1p + h2p) < 360) hbarp = (h1p + h2p + 360) / 2;
    else hbarp = (h1p + h2p - 360) / 2;

    // Step 7: T
    let T = 1
        - 0.17 * Math.cos(deg2rad(hbarp - 30))
        + 0.24 * Math.cos(deg2rad(2 * hbarp))
        + 0.32 * Math.cos(deg2rad(3 * hbarp + 6))
        - 0.20 * Math.cos(deg2rad(4 * hbarp - 63));

    // Step 8: SL, SC, SH
    let SL = 1 + (0.015 * Math.pow(Lbar - 50, 2)) / Math.sqrt(20 + Math.pow(Lbar - 50, 2));
    let SC = 1 + 0.045 * Cbarp;
    let SH = 1 + 0.015 * Cbarp * T;

    // Step 9: RT
    let deltaTheta = 30 * Math.exp(-Math.pow((hbarp - 275) / 25, 2));
    let RC = 2 * Math.sqrt(Math.pow(Cbarp,7) / (Math.pow(Cbarp,7) + Math.pow(25,7)));
    let RT = -RC * Math.sin(deg2rad(2 * deltaTheta));

    // Step 10: Final ΔE2000
    let dE = Math.sqrt(
        Math.pow(dLp / SL, 2) +
        Math.pow(dCp / SC, 2) +
        Math.pow(dHp / SH, 2) +
        RT * (dCp / SC) * (dHp / SH)
    );

    output.innerHTML = "ΔE2000 = " + dE.toFixed(4);
}

// Element shortcuts
const L1Elem = document.getElementById("L1");
const a1Elem = document.getElementById("a1");
const b1Elem = document.getElementById("b1");

const L2Elem = document.getElementById("L2");
const a2Elem = document.getElementById("a2");
const b2Elem = document.getElementById("b2");

const output = document.getElementById("output");
</script>

</body>
</html>
